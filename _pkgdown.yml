url: https://heorlytics.github.io/seerSurv/

template:
  bootstrap: 5
  bootswatch: flatly
  math-rendering: mathjax

home:
  title: "seerSurv — Cancer Recurrence Transition Probabilities"
  description: >
    Derive monthly LR->DR transition probabilities for health economic models
    from aggregate SEER-17 survival data.

authors:
  Shubhram Pandey:
    href: https://heorlytics.com
  Heorlytics Ltd:
    href: https://heorlytics.com

navbar:
  structure:
    left:  [reference, articles, news]
    right: [search, github]
  components:
    articles:
      text: Articles
      menu:
        - text: Introduction to seerSurv
          href: articles/seerSurv-intro.html
        - text: Multi-Tumour Analysis
          href: articles/multi-tumour-analysis.html
    github:
      icon: fa-github
      href: https://github.com/heorlytics/seerSurv
      aria-label: GitHub

reference:
  - title: "Main analysis wrapper"
    desc: "End-to-end function for a single tumour type"
    contents:
      - run_tumour_analysis

  - title: "Step-by-step building blocks"
    desc: >
      Individual functions that run_tumour_analysis() calls internally,
      exposed for custom workflows.
    contents:
      - prep_ipd
      - fit_models
      - extract_ic
      - compute_weights
      - blend_survival
      - predict_surv
      - make_background_surv
      - rmst

  - title: "Visualisation"
    contents:
      - plot_survival_curves

  - title: "Bundled datasets"
    contents:
      - lifetable_seer
      - tumour_data_seer

  - title: "Package"
    contents:
      - seerSurv-package

articles:
  - title: "Getting started"
    navbar: ~
    contents:
      - seerSurv-intro
  - title: "Advanced usage"
    navbar: ~
    contents:
      - multi-tumour-analysis

news:
  one_page: true
